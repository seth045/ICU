<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
  }

  #hero {
    position: relative;
    width: 100%; height: 100vh;
    overflow: hidden;
  }

  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #vid    { display: none; }

  /* ── Overlays ───────────────────────────── */
  /* Centre-focused darkening so text reads cleanly */
  #grad {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 68% 62% at 50% 50%, rgba(0,0,0,.22) 0%, rgba(0,0,0,.08) 65%, rgba(0,0,0,.02) 100%),
      linear-gradient(to bottom, rgba(0,0,0,.08) 0%, rgba(0,0,0,.13) 100%);
    pointer-events: none;
  }

  #vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 92% 82% at 50% 50%, transparent 40%, rgba(0,0,0,.16) 100%);
    pointer-events: none;
  }

  /* ── Content wrapper — centres the content block ── */
  #content-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  /* ── Content ────────────────────────────── */
  #content {
    pointer-events: auto;
    display: flex; flex-direction: column;
    align-items: center; gap: 1.6rem;
    text-align: center;
    padding: 0 2rem;
    max-width: 1020px;
    width: 100%;
    opacity: 0;
  }
  #content.show {
    animation: rise 1.2s cubic-bezier(.16,1,.3,1) forwards;
  }
  #content.show > * {
    animation: rise 1s cubic-bezier(.16,1,.3,1) both;
  }
  #content.show > *:nth-child(1) { animation-delay: .0s;  }
  #content.show > *:nth-child(2) { animation-delay: .12s; }
  #content.show > *:nth-child(3) { animation-delay: .26s; }
  #content.show > *:nth-child(4) { animation-delay: .42s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  /* ── Type ───────────────────────────────── */
  .eyebrow {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: clamp(.62rem, 1.1vw, .78rem);
    font-weight: 500;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: rgba(255,255,255,.48);
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(3.8rem, 11vw, 9rem);
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -.03em;
    color: #fff;
    text-shadow: 0 2px 40px rgba(0,0,0,.28);
  }
  h1 em { font-style: italic; font-weight: 400; }

  .sub {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: clamp(.95rem, 1.5vw, 1.15rem);
    font-weight: 300;
    line-height: 1.68;
    color: rgba(255,255,255,.62);
    max-width: 42rem;
  }

  /* ── Social buttons ─────────────────────── */
  .socials {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: .6rem;
    margin-top: .25rem;
  }

  .social-btn {
    display: inline-flex; align-items: center; gap: .48rem;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: .7rem; font-weight: 500;
    letter-spacing: .07em; text-transform: uppercase;
    text-decoration: none;
    color: rgba(255,255,255,.72);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 9999px;
    padding: .55rem 1.2rem;
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background .2s, border-color .2s, color .2s, transform .22s;
  }
  .social-btn:hover {
    background: rgba(255,255,255,.15);
    border-color: rgba(255,255,255,.5);
    color: #fff;
    transform: translateY(-2px);
  }
  .social-btn svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

  /* ── Scroll hint ────────────────────────── */
  #scroll-hint {
    position: absolute; bottom: 2.2rem; right: 2.5rem;
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    z-index: 10; opacity: 0; transition: opacity 1.2s .9s;
  }
  #scroll-hint.show { opacity: 1; }
  #scroll-hint span {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: .52rem; font-weight: 500;
    letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255,255,255,.28);
    writing-mode: vertical-rl;
  }
  .hint-line {
    width: 1px; height: 34px;
    background: linear-gradient(to bottom, rgba(255,255,255,.32), transparent);
    animation: drip 2s ease-in-out infinite;
  }
  @keyframes drip {
    0%,100% { transform: translateY(-3px); opacity: .4; }
    50%     { transform: translateY(4px);  opacity: .85; }
  }

  /* ── Loader ─────────────────────────────── */
  #loader {
    position: fixed; inset: 0;
    background: #050303;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.5rem;
    z-index: 300;
    transition: opacity 1s ease;
  }
  #loader.out { opacity: 0; pointer-events: none; }

  .ld-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem; font-weight: 400;
    color: rgba(255,255,255,.5);
    letter-spacing: .04em;
  }
  .ld-label {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: .58rem; font-weight: 500;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(255,255,255,.22);
  }
  .ld-track {
    width: 160px; height: 1px;
    background: rgba(255,255,255,.1); border-radius: 1px; overflow: hidden;
  }
  .ld-fill {
    height: 100%; width: 0%;
    background: rgba(255,255,255,.55); border-radius: 1px;
    transition: width .08s linear;
  }
</style>

<script>
  const vid     = document.getElementById('vid');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const loader  = document.getElementById('loader');
  const fill    = document.getElementById('fill');
  const content = document.getElementById('content');
  const hint    = document.getElementById('scroll-hint');

  function setSize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  setSize();
  window.addEventListener('resize', setSize);

  const PLAY_FPS = 30;
  const frames   = [];
  let idx = 0, dir = 1;

  async function init() {
    // Wait for metadata
    if (vid.readyState < 1)
      await new Promise(r => vid.addEventListener('loadedmetadata', r, { once: true }));

    const W = vid.videoWidth  || 1280;
    const H = vid.videoHeight || 720;

    // OffscreenCanvas lets us call transferToImageBitmap() — synchronous,
    // no async overhead per frame, much faster than createImageBitmap()
    const off    = new OffscreenCanvas(W, H);
    const offCtx = off.getContext('2d');

    // Seek to start
    vid.currentTime = 0;
    await new Promise(r => vid.addEventListener('seeked', r, { once: true }));

    // ── Fast capture via requestVideoFrameCallback at 4× speed ──
    // Playing at 4× means the whole video passes in ¼ the time.
    // rVFC fires for every decoded frame — no seek overhead at all.
    vid.playbackRate = 4;

    await new Promise(resolve => {
      function onFrame() {
        offCtx.drawImage(vid, 0, 0, W, H);
        frames.push(off.transferToImageBitmap()); // synchronous GPU transfer

        fill.style.width = Math.min(100, vid.currentTime / vid.duration * 100) + '%';

        if (vid.currentTime < vid.duration - 0.08) {
          vid.requestVideoFrameCallback(onFrame);
        } else {
          vid.pause();
          vid.playbackRate = 1;
          fill.style.width = '100%';
          resolve();
        }
      }
      vid.requestVideoFrameCallback(onFrame);
      vid.play();
    });

    // Reveal
    loader.classList.add('out');
    setTimeout(() => {
      loader.remove();
      content.classList.add('show');
      hint.classList.add('show');
    }, 820);

    // ── Playback loop ────────────────────────────────────────────
    const MS = 1000 / PLAY_FPS;
    let last = 0;

    function draw(now) {
      requestAnimationFrame(draw);
      if (now - last < MS) return;
      last = now;

      const f     = frames[idx];
      const scale = Math.max(canvas.width / f.width, canvas.height / f.height);
      const w = f.width  * scale, h = f.height * scale;
      ctx.drawImage(f, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);

      idx += dir;
      if (idx >= frames.length) { idx = frames.length - 1; dir = -1; }
      else if (idx < 0)         { idx = 0;                 dir =  1; }
    }

    requestAnimationFrame(draw);
  }

  init();
</script>
